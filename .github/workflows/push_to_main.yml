on:
  push:
    branches:
      - main

env:
  KC_VERSION_TAG: 24.0.5

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run prek
        uses: j178/prek-action@v2
        env:
          SKIP: no-commit-to-branch

  build_and_publish:
    runs-on: ubuntu-latest
    needs: [checks]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish image
        uses: pvarki/config-ci-library/.github/actions/publish-image@main
        with:
          product: keycloak
          component: server
          extra-tag: KC-${{ env.KC_VERSION_TAG }}
          build-args: |
            KC_VERSION_TAG=${{ env.KC_VERSION_TAG }}
          dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          acr-repo: ${{ vars.ACR_REPO }}
          acr-username: ${{ vars.ACR_USERNAME }}
          acr-token: ${{ secrets.ACR_TOKEN }}
